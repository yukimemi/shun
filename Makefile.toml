[tasks.default]
alias = "check"

[tasks.check]
description = "Run fmt + clippy + Rust tests + frontend tests + lock-check"
dependencies = [
    "fmt-check",
    "clippy",
    "test",
    "test-frontend",
    "lock-check",
]

[tasks.fmt-check]
description = "Check Rust formatting (src-tauri/)"
cwd = "src-tauri"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt]
description = "Apply Rust formatting (src-tauri/)"
cwd = "src-tauri"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy]
description = "Run clippy with warnings as errors (src-tauri/)"
cwd = "src-tauri"
command = "cargo"
args = ["clippy", "--locked", "--all-targets", "--", "-D", "warnings"]

[tasks.test]
description = "Rust unit tests (src-tauri/)"
cwd = "src-tauri"
command = "cargo"
args = ["test", "--locked"]

[tasks.test-frontend]
description = "Frontend tests (Vitest)"
command = "npm"
args = ["test"]

[tasks.lock-check]
description = "Verify src-tauri/Cargo.lock is in sync with Cargo.toml"
cwd = "src-tauri"
command = "cargo"
args = ["check", "--locked", "--all-targets"]

[tasks.tauri-dev]
description = "Launch the Tauri app in dev mode"
command = "npm"
args = ["run", "tauri", "dev"]

[tasks.tauri-build]
description = "Production Tauri build"
command = "npm"
args = ["run", "tauri", "build"]

[tasks.hook-install]
description = "Install git pre-push hook that runs 'cargo make check'"
script_runner = "@duckscript"
script = '''
hook_dir = set ".git/hooks"
hook_file = set "${hook_dir}/pre-push"
mkdir ${hook_dir}
hook_content = set "#!/bin/sh\n# Installed by: cargo make hook-install\ncargo make check"
writefile ${hook_file} ${hook_content}
echo "Installed pre-push hook -> ${hook_file}"
'''

[tasks.apm-install]
description = "Install agent skills declared in apm.yml — pinned to copilot, claude, and gemini targets"
command = "apm"
args = ["install", "-t", "copilot,claude,gemini"]

[tasks.apm-install-update]
description = "Refresh APM dependencies to upstream latest (used by on-add hook)"
command = "apm"
args = ["install", "--update", "-t", "copilot,claude,gemini"]

[tasks.vcs-fetch]
description = "Fetch latest origin refs (jj when in a jj workspace, otherwise git)"
script_runner = "@duckscript"
script = '''
# A non-colocated jj workspace has `.jj/` but no `.git/`, and `git fetch`
# fails there with "not a git repository". Prefer `jj git fetch`, which
# works in pure-jj and colocated repos. Fall back to `git fetch` for
# pure-git (no `.jj/`) worktrees.
#
# Best-effort: don't `--fail-on-error` because a transient network
# failure during `renri add` shouldn't break the worktree; the user
# can always `cargo make vcs-fetch` later.
if is_path_exists .jj
    exec jj git fetch
else
    exec git fetch
end
'''

[tasks.on-add]
description = "Wired to renri's [[hooks.post_create]] — runs in a freshly created worktree"
dependencies = ["apm-install-update", "vcs-fetch"]

[tasks.setup]
description = "One-time setup for new contributors: pre-push hook + APM install (requires `apm` CLI on PATH — see https://github.com/microsoft/apm)"
dependencies = ["hook-install", "apm-install"]

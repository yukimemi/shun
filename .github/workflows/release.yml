name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

  test-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  release:
    needs: [test-frontend, test-rust]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_target: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Update version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          perl -i -pe "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json src-tauri/tauri.conf.json
          perl -i -pe "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "shun ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            See commits for details.

            ## Installation

            Download the installer for your platform from the assets below:

            | Platform | File |
            |---|---|
            | Windows | `.msi` (installer) or `shun-windows-x64.zip` (portable) |
            | macOS | `.dmg` |
            | Linux | `.AppImage` or `.deb` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Commit version bump to main
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          perl -i -pe "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json src-tauri/tauri.conf.json
          perl -i -pe "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin main

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "shun-windows-x64.zip"
          # exe と portable.txt をカレントディレクトリにコピーしてルートに配置
          Copy-Item "src-tauri/target/release/shun.exe" "shun.exe"
          "portable" | Out-File -FilePath "portable.txt" -Encoding utf8 -NoNewline
          Compress-Archive -Path "shun.exe","portable.txt" -DestinationPath $zipName -Force
          gh release upload $version $zipName --clobber

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  test-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust fmt check
        if: matrix.os == 'ubuntu-22.04'
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust clippy
        if: matrix.os == 'ubuntu-22.04'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  release:
    needs: [test-frontend, test-rust]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_target: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Update version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          perl -i -pe "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json src-tauri/tauri.conf.json
          perl -i -pe "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "shun ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            See commits for details.

            ## Installation

            Download the installer for your platform from the assets below:

            | Platform | File |
            |---|---|
            | Windows | `*-setup.exe` (installer, no admin required) or `shun-windows-x64.zip` (portable) |
            | macOS | `.dmg` |
            | Linux | `.AppImage` or `.deb` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Commit version bump to main
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -- .
          git checkout main
          perl -i -pe "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json src-tauri/tauri.conf.json
          perl -i -pe "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin main

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "shun-windows-x64.zip"
          # exe と portable.txt をカレントディレクトリにコピーしてルートに配置
          Copy-Item "src-tauri/target/release/shun.exe" "shun.exe"
          "portable" | Out-File -FilePath "portable.txt" -Encoding utf8 -NoNewline
          Compress-Archive -Path "shun.exe","portable.txt" -DestinationPath $zipName -Force
          gh release upload $version $zipName --clobber

  update-scoop:
    needs: release
    if: github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    env:
      SCOOP_BUCKET_PAT: ${{ secrets.SCOOP_BUCKET_PAT }}
    steps:
      - name: Checkout shun repo
        uses: actions/checkout@v6

      - name: Download Windows portable zip and compute SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release download "${VERSION}" --pattern "shun-windows-x64.zip" --repo yukimemi/shun
          SHA256=$(sha256sum shun-windows-x64.zip | awk '{print $1}')
          echo "SHA256=${SHA256}" >> $GITHUB_ENV
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_ENV

      - name: Checkout scoop-bucket repo
        if: env.SCOOP_BUCKET_PAT != ''
        uses: actions/checkout@v6
        with:
          repository: yukimemi/scoop-bucket
          token: ${{ secrets.SCOOP_BUCKET_PAT }}
          path: scoop-bucket

      - name: Update scoop-bucket manifest
        if: env.SCOOP_BUCKET_PAT != ''
        run: |
          cd scoop-bucket
          python3 - <<'EOF'
          import json, os, sys
          version = os.environ["VERSION_NO_V"]
          sha256 = os.environ["SHA256"]
          with open("bucket/shun.json", "r") as f:
              manifest = json.load(f)
          manifest["version"] = version
          manifest["architecture"]["64bit"]["url"] = f"https://github.com/yukimemi/shun/releases/download/v{version}/shun-windows-x64.zip"
          manifest["architecture"]["64bit"]["hash"] = sha256
          with open("bucket/shun.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit and push to scoop-bucket
        if: env.SCOOP_BUCKET_PAT != ''
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/shun.json
          git diff --cached --quiet || git commit -m "chore: update shun to ${{ github.ref_name }}"
          git push

  update-homebrew:
    needs: release
    if: github.event_name == 'push' && success()
    runs-on: macos-latest
    env:
      HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
    steps:
      - name: Checkout shun repo
        uses: actions/checkout@v6

      - name: Download macOS DMG and compute SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          gh release download "${VERSION}" --pattern "shun_${VERSION_NO_V}_universal.dmg" --repo yukimemi/shun
          SHA256=$(shasum -a 256 "shun_${VERSION_NO_V}_universal.dmg" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> $GITHUB_ENV
          echo "VERSION_NO_V=${VERSION_NO_V}" >> $GITHUB_ENV

      - name: Checkout homebrew-tap repo
        if: env.HOMEBREW_TAP_PAT != ''
        uses: actions/checkout@v6
        with:
          repository: yukimemi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Update Homebrew cask formula
        if: env.HOMEBREW_TAP_PAT != ''
        run: |
          cd homebrew-tap
          perl -i -pe "s/version \".*\"/version \"${{ env.VERSION_NO_V }}\"/" Casks/shun.rb
          perl -i -pe "s/sha256 \".*\"/sha256 \"${{ env.SHA256 }}\"/" Casks/shun.rb

      - name: Commit and push to homebrew-tap
        if: env.HOMEBREW_TAP_PAT != ''
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/shun.rb
          git diff --cached --quiet || git commit -m "chore: update shun to ${{ github.ref_name }}"
          git push

  test-installer:
    needs: release
    if: github.event_name == 'push' && success()
    runs-on: windows-latest
    steps:
      - name: Download installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.ref_name }}" --pattern "*_x64-setup.exe" --repo yukimemi/shun

      - name: Test silent install (/S)
        shell: pwsh
        run: |
          $exe = Get-ChildItem "*_x64-setup.exe" | Select-Object -First 1
          Write-Host "Testing silent install: $($exe.Name) /S"
          $p = Start-Process $exe.FullName -ArgumentList "/S" -Wait -PassThru
          Write-Host "Exit code (/S): $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { Write-Error "/S install failed (exit $($p.ExitCode))"; exit 1 }
          if (-not (Test-Path "$env:LocalAppData\shun\shun.exe")) {
            Write-Error "shun.exe not found after /S install"
            exit 1
          }
          Write-Host "OK: /S silent install succeeded"

      - name: Uninstall after /S test
        shell: pwsh
        run: |
          $uninstaller = "$env:LocalAppData\shun\uninstall.exe"
          if (Test-Path $uninstaller) {
            $p = Start-Process $uninstaller -ArgumentList "/S" -Wait -PassThru
            Write-Host "Uninstall exit code: $($p.ExitCode)"
          } else {
            Write-Host "Uninstaller not found, skipping"
          }


  submit-winget:
    needs: [release, test-installer]
    if: github.event_name == 'push' && success()
    runs-on: windows-latest
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit to WinGet
        if: env.WINGET_TOKEN != ''
        continue-on-error: true
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: yukimemi.shun
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: '_x64-setup\.exe$'
          override-manifest-fields: |
            InstallerSwitches:
              Silent: /S
              SilentWithProgress: /S
